input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  if [type] == "app_log" {
    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{LOGLEVEL:level}: %{GREEDYDATA:log_message}"
      }
    }

    # Tag errors for X-DevOps AI engine to pick up
    if [level] in ["ERROR", "FATAL", "CRITICAL"] {
      mutate {
        add_tag => ["error", "xdevops_alert"]
      }
    }

    if [log_message] =~ /OOMKilled|CrashLoopBackOff|OutOfMemory/ {
      mutate {
        add_tag => ["critical_failure", "xdevops_alert"]
        add_field => { "failure_type" => "memory" }
      }
    }

    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "xdevops-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
