<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X-DevOps · AI Self-Healing Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --orange: #d29922;
      --purple: #bc8cff;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .navbar-brand { font-size: 18px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 8px; }
    .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-green { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); }
    .badge-red { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); }
    .badge-orange { background: rgba(210,153,34,.15); color: var(--orange); border: 1px solid rgba(210,153,34,.3); }
    .badge-blue { background: rgba(88,166,255,.15); color: var(--accent); border: 1px solid rgba(88,166,255,.3); }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
    .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card-title { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; font-weight: 600; }
    .metric-value { font-size: 32px; font-weight: 700; }
    .metric-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .gauge-bar { height: 6px; background: var(--surface2); border-radius: 3px; margin-top: 12px; overflow: hidden; }
    .gauge-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .alert { border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid; }
    .alert-critical { background: rgba(248,81,73,.08); border-color: rgba(248,81,73,.3); }
    .alert-high { background: rgba(210,153,34,.08); border-color: rgba(210,153,34,.3); }
    .alert-medium { background: rgba(88,166,255,.08); border-color: rgba(88,166,255,.3); }
    .alert-healthy { background: rgba(63,185,80,.08); border-color: rgba(63,185,80,.3); }
    .alert-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .alert-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .pipeline { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 16px 0; }
    .pipe-step { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .pipe-step.active { border-color: var(--accent); color: var(--accent); }
    .pipe-step.done { border-color: var(--green); color: var(--green); }
    .pipe-arrow { color: var(--muted); font-size: 14px; }
    .sim-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; position: relative; }
    .sim-card.recommended { border-color: var(--green); background: rgba(63,185,80,.05); }
    .sim-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
    .sim-meta { display: flex; gap: 12px; font-size: 12px; color: var(--muted); }
    .score-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 10px; }
    .score-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--green)); }
    .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all .2s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #79b8ff; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-success { background: var(--green); color: #fff; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); }
    .chat-container { display: flex; flex-direction: column; height: 380px; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; gap: 10px; }
    .chat-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .chat-msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-radius: 12px 12px 2px 12px; }
    .chat-msg.bot { background: var(--surface2); align-self: flex-start; border-radius: 12px 12px 12px 2px; }
    .chat-input { display: flex; gap: 8px; margin-top: 12px; }
    .chat-input input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; }
    .chat-input input:focus { border-color: var(--accent); }
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .timeline-item { display: flex; gap: 12px; padding-bottom: 16px; position: relative; }
    .timeline-item:not(:last-child)::before { content: ''; position: absolute; left: 15px; top: 32px; bottom: 0; width: 1px; background: var(--border); }
    .timeline-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .timeline-body { flex: 1; padding-top: 4px; }
    .timeline-title { font-size: 13px; font-weight: 600; }
    .timeline-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .timeline-detail { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .code-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: 'Courier New', monospace; font-size: 12px; color: #a5d6ff; margin-top: 8px; overflow-x: auto; }
    .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .2s; }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .slider-container { margin-bottom: 16px; }
    .slider-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .slider { width: 100%; height: 4px; appearance: none; background: var(--surface2); border-radius: 2px; outline: none; }
    .slider::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    input[type=range] { accent-color: var(--accent); }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .justify-between { justify-content: space-between; }
    .text-sm { font-size: 13px; }
    .text-xs { font-size: 11px; }
    .text-muted { color: var(--muted); }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mb-2 { margin-bottom: 8px; }
    .font-bold { font-weight: 700; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API_BASE = "http://localhost:8000";

const SEVERITY_COLORS = { critical: "#f85149", high: "#d29922", medium: "#58a6ff", low: "#3fb950" };
const SEVERITY_BADGE = { critical: "badge-red", high: "badge-orange", medium: "badge-blue", low: "badge-green" };

function MetricCard({ label, value, unit, threshold, icon }) {
  const pct = Math.min(100, (value / threshold) * 100);
  const color = pct > 90 ? "#f85149" : pct > 70 ? "#d29922" : "#3fb950";
  return (
    <div className="card">
      <div className="card-title">{icon} {label}</div>
      <div className="metric-value" style={{ color }}>{value}<span style={{fontSize:16,color:"var(--muted)"}}>{unit}</span></div>
      <div className="metric-label">Threshold: {threshold}{unit}</div>
      <div className="gauge-bar"><div className="gauge-fill" style={{ width: pct + "%", background: color }} /></div>
    </div>
  );
}

function PipelineFlow({ stages }) {
  return (
    <div className="pipeline">
      {stages.map((s, i) => (
        <React.Fragment key={s.name}>
          <div className={`pipe-step ${s.status}`}>
            <span>{s.icon}</span> {s.name}
          </div>
          {i < stages.length - 1 && <span className="pipe-arrow">→</span>}
        </React.Fragment>
      ))}
    </div>
  );
}

function SimulationCards({ simulations, recommended }) {
  if (!simulations?.length) return <div className="text-muted text-sm">Run analysis to see simulations.</div>;
  return (
    <div>
      {simulations.map(s => (
        <div key={s.action_key} className={`sim-card ${s.action_key === recommended ? "recommended" : ""}`}>
          <div className="flex justify-between items-center">
            <div className="sim-title">
              {s.action_key === recommended && "⭐ "}{s.name}
            </div>
            <span className={`badge ${s.action_key === recommended ? "badge-green" : "badge-blue"}`}>
              {s.success_probability_pct}
            </span>
          </div>
          <div className="sim-meta">
            <span>Risk: {s.risk}</span>
            <span>Downtime: {s.estimated_downtime_sec}s</span>
            <span>Score: {(s.score * 100).toFixed(0)}</span>
          </div>
          <div className="code-block">{s.kubernetes_command}</div>
          <div className="score-bar"><div className="score-fill" style={{ width: (s.score * 100) + "%" }} /></div>
        </div>
      ))}
    </div>
  );
}

function ChatInterface() {
  const [messages, setMessages] = useState([
    { role: "bot", text: "👋 Hi! I'm your DevOps AI assistant. Ask me anything about system failures, status, or best fixes." }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const ref = useRef();

  useEffect(() => { ref.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  async function send() {
    if (!input.trim()) return;
    const q = input.trim();
    setInput("");
    setMessages(m => [...m, { role: "user", text: q }]);
    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q })
      });
      const data = await res.json();
      setMessages(m => [...m, { role: "bot", text: data.answer }]);
    } catch {
      setMessages(m => [...m, { role: "bot", text: "⚠️ API not reachable. Start the backend with: cd backend && uvicorn main:app --reload" }]);
    }
    setLoading(false);
  }

  return (
    <div className="card" style={{ height: "100%" }}>
      <div className="section-title">💬 ChatOps Interface</div>
      <div className="chat-container">
        <div className="chat-messages">
          {messages.map((m, i) => (
            <div key={i} className={`chat-msg ${m.role}`}>{m.text}</div>
          ))}
          {loading && <div className="chat-msg bot">⏳ Thinking...</div>}
          <div ref={ref} />
        </div>
        <div className="chat-input">
          <input
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === "Enter" && send()}
            placeholder="Ask: Why did the system restart?"
          />
          <button className="btn btn-primary" onClick={send}>Send</button>
        </div>
      </div>
    </div>
  );
}

function IncidentTimeline({ incidents }) {
  const icons = { scale_pods: "📈", restart_service: "🔄", rollback_deployment: "⏪", cleanup_logs: "🧹", none: "⏭️" };
  const dotColors = { 1: "#3fb950", 0: "#f85149" };
  if (!incidents?.length) return <div className="text-muted text-sm">No incidents recorded yet. Run demo scenarios to generate data.</div>;
  return (
    <div className="timeline">
      {incidents.slice(0, 8).map((inc, i) => (
        <div key={i} className="timeline-item">
          <div className="timeline-dot" style={{ background: `${dotColors[inc.success] ?? "#8b949e"}22`, border: `2px solid ${dotColors[inc.success] ?? "#8b949e"}` }}>
            {icons[inc.action_taken] || "⚡"}
          </div>
          <div className="timeline-body">
            <div className="flex justify-between">
              <div className="timeline-title">{inc.primary_metric?.replace(/_/g, " ").toUpperCase()} incident</div>
              <span className={`badge ${SEVERITY_BADGE[inc.severity] || "badge-blue"}`}>{inc.severity}</span>
            </div>
            <div className="timeline-time">{inc.timestamp?.slice(0, 19).replace("T", " ")}</div>
            <div className="timeline-detail">Action: {inc.action_taken || "none"} · {inc.success ? "✅ Resolved" : "❌ Unresolved"}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
export default function App() {
  const [tab, setTab] = useState("dashboard");
  const [metrics, setMetrics] = useState({
    cpu_usage: 45, memory_usage: 70, error_rate: 2,
    response_time_ms: 800, pod_restart_count: 1, disk_usage: 55
  });
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [stats, setStats] = useState(null);
  const [demoRunning, setDemoRunning] = useState(false);

  useEffect(() => { fetchStats(); }, []);

  async function fetchStats() {
    try {
      const r = await fetch(`${API_BASE}/api/stats`);
      setStats(await r.json());
    } catch {}
  }

  async function runAnalysis() {
    setLoading(true);
    try {
      const r = await fetch(`${API_BASE}/api/analyze/metrics`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ...metrics, service_name: "demo-app", namespace: "default" })
      });
      const data = await r.json();
      setResult(data);
      setTimeout(fetchStats, 500);
    } catch {
      setResult({ error: "Backend not running. Start with: cd backend && uvicorn main:app --reload" });
    }
    setLoading(false);
  }

  async function runDemo(scenario) {
    setDemoRunning(true);
    try {
      const r = await fetch(`${API_BASE}/api/simulate/demo?scenario=${scenario}`);
      const data = await r.json();
      setResult(data);
      setTab("analysis");
      setTimeout(fetchStats, 500);
    } catch {
      setResult({ error: "Backend not running." });
    }
    setDemoRunning(false);
  }

  const pipeline = result?.pipeline ? [
    { name: "Detect", icon: "🔍", status: "done" },
    { name: "Explain", icon: "🧠", status: "done" },
    { name: "Simulate", icon: "🎭", status: "done" },
    { name: "Decide", icon: "⚡", status: "done" },
    { name: "Learn", icon: "📚", status: "done" },
  ] : [
    { name: "Detect", icon: "🔍", status: "" },
    { name: "Explain", icon: "🧠", status: "" },
    { name: "Simulate", icon: "🎭", status: "" },
    { name: "Decide", icon: "⚡", status: "" },
    { name: "Learn", icon: "📚", status: "" },
  ];

  const summary = stats?.learning_summary || {};
  const incidents = stats?.recent_incidents || [];

  return (
    <div>
      <nav className="navbar">
        <div className="navbar-brand">
          <span>⚡</span> X-DevOps
          <span className="badge badge-green" style={{ marginLeft: 8 }}>
            <span className="dot" style={{ background: "#3fb950", marginRight: 4 }} />LIVE
          </span>
        </div>
        <div className="flex gap-2">
          {["dashboard", "analysis", "incidents", "chat"].map(t => (
            <button key={t} onClick={() => setTab(t)} className={`btn ${tab === t ? "btn-primary" : "btn-outline"}`}>
              {t.charAt(0).toUpperCase() + t.slice(1)}
            </button>
          ))}
        </div>
      </nav>

      <div className="container">

        {tab === "dashboard" && (
          <>
            {/* KPI Cards */}
            <div className="grid-4">
              <div className="card">
                <div className="card-title">Total Incidents</div>
                <div className="metric-value" style={{ color: "var(--orange)" }}>{summary.total_incidents || 0}</div>
                <div className="metric-label">Detected & processed</div>
              </div>
              <div className="card">
                <div className="card-title">Auto-Resolved</div>
                <div className="metric-value" style={{ color: "var(--green)" }}>{summary.resolved || 0}</div>
                <div className="metric-label">Self-healed</div>
              </div>
              <div className="card">
                <div className="card-title">Resolution Rate</div>
                <div className="metric-value" style={{ color: "var(--accent)" }}>{((summary.resolution_rate || 0) * 100).toFixed(0)}%</div>
                <div className="metric-label">Historical success</div>
              </div>
              <div className="card">
                <div className="card-title">AI Engine</div>
                <div className="metric-value" style={{ color: "var(--green)", fontSize: 20 }}>🟢 Online</div>
                <div className="metric-label">All modules active</div>
              </div>
            </div>

            {/* Live Metrics */}
            <div className="grid-4">
              <MetricCard label="CPU Usage" value={metrics.cpu_usage} unit="%" threshold={85} icon="💻" />
              <MetricCard label="Memory" value={metrics.memory_usage} unit="%" threshold={90} icon="🧠" />
              <MetricCard label="Error Rate" value={metrics.error_rate} unit="%" threshold={5} icon="❌" />
              <MetricCard label="Response Time" value={metrics.response_time_ms} unit="ms" threshold={2000} icon="⏱️" />
            </div>

            {/* Pipeline + Demo Scenarios */}
            <div className="grid-2">
              <div className="card">
                <div className="section-title">🔄 AI Pipeline</div>
                <PipelineFlow stages={pipeline} />
                <div className="text-sm text-muted mt-2">
                  Five-stage automated pipeline: Detect → Explain → Simulate → Decide → Learn
                </div>
              </div>
              <div className="card">
                <div className="section-title">🎭 Demo Scenarios</div>
                <div className="flex gap-2" style={{ flexWrap: "wrap" }}>
                  {["memory", "cpu", "error_rate", "rollback", "healthy"].map(s => (
                    <button key={s} className="btn btn-outline" onClick={() => runDemo(s)} disabled={demoRunning}>
                      {demoRunning ? "Running..." : s.replace("_", " ").toUpperCase()}
                    </button>
                  ))}
                </div>
                <div className="text-xs text-muted mt-3">
                  Click any scenario to simulate a failure and watch the AI self-heal it.
                </div>
              </div>
            </div>

            {/* Timeline */}
            <div className="card">
              <div className="section-title">📋 Recent Incidents</div>
              <IncidentTimeline incidents={incidents} />
            </div>
          </>
        )}

        {tab === "analysis" && (
          <>
            {/* Metric Sliders */}
            <div className="card" style={{ marginBottom: 24 }}>
              <div className="section-title">🎚️ Configure Metrics & Analyze</div>
              <div className="grid-2">
                {[
                  { key: "cpu_usage", label: "CPU Usage", max: 100, unit: "%" },
                  { key: "memory_usage", label: "Memory Usage", max: 100, unit: "%" },
                  { key: "error_rate", label: "Error Rate", max: 50, unit: "%" },
                  { key: "response_time_ms", label: "Response Time", max: 10000, unit: "ms" },
                  { key: "pod_restart_count", label: "Pod Restart Count", max: 10, unit: "" },
                  { key: "disk_usage", label: "Disk Usage", max: 100, unit: "%" },
                ].map(m => (
                  <div key={m.key} className="slider-container">
                    <div className="slider-label">
                      <span>{m.label}</span>
                      <span style={{ color: "var(--accent)" }}>{metrics[m.key]}{m.unit}</span>
                    </div>
                    <input type="range" className="slider" min={0} max={m.max} step={m.key === "response_time_ms" ? 100 : 1}
                      value={metrics[m.key]}
                      onChange={e => setMetrics(prev => ({ ...prev, [m.key]: Number(e.target.value) }))}
                    />
                  </div>
                ))}
              </div>
              <button className="btn btn-primary" onClick={runAnalysis} disabled={loading} style={{ marginTop: 8 }}>
                {loading ? "⏳ Analyzing..." : "🚀 Run AI Analysis"}
              </button>
            </div>

            {/* Results */}
            {result && !result.error && (
              <>
                <PipelineFlow stages={pipeline} />
                {result.status === "healthy" ? (
                  <div className="alert alert-healthy">
                    <div className="alert-title" style={{ color: "var(--green)" }}>✅ System Healthy</div>
                    <div className="alert-desc">{result.message}</div>
                  </div>
                ) : (
                  <div className="grid-3">
                    <div>
                      {/* Explanation */}
                      <div className="card" style={{ marginBottom: 16 }}>
                        <div className="section-title">🧠 Root Cause Analysis</div>
                        <div className={`alert alert-${result.summary?.severity}`}>
                          <div className="flex justify-between items-center mb-2">
                            <div className="alert-title">{result.pipeline?.explanation?.root_cause?.title}</div>
                            <span className={`badge ${SEVERITY_BADGE[result.summary?.severity]}`}>
                              {result.summary?.severity?.toUpperCase()}
                            </span>
                          </div>
                          <div className="alert-desc">{result.pipeline?.explanation?.root_cause?.description}</div>
                          <div className="mt-2 text-xs text-muted">
                            Confidence: {result.pipeline?.explanation?.confidence_pct} · Impact: {result.pipeline?.explanation?.root_cause?.impact}
                          </div>
                        </div>
                        <div className="text-sm text-muted mt-2">
                          💊 Recommendation: {result.pipeline?.explanation?.recommendation}
                        </div>
                      </div>

                      {/* Decision */}
                      <div className="card">
                        <div className="section-title">⚡ Decision Made</div>
                        <div className="flex gap-2 items-center mb-2">
                          <span className="badge badge-green">{result.pipeline?.decision?.status?.toUpperCase()}</span>
                          <span className="text-sm font-bold">{result.pipeline?.decision?.action_name}</span>
                        </div>
                        <div className="code-block">{result.pipeline?.decision?.command}</div>
                        <div className="text-xs text-muted mt-2">
                          {result.pipeline?.decision?.dry_run ? "⚠️ DRY RUN mode — command logged but not executed" : "✅ Command executed on cluster"}
                        </div>
                      </div>
                    </div>

                    {/* Simulations */}
                    <div className="card">
                      <div className="section-title">🎭 Simulation Results</div>
                      <SimulationCards
                        simulations={result.pipeline?.simulation?.simulations}
                        recommended={result.pipeline?.simulation?.recommended_action}
                      />
                    </div>
                  </div>
                )}
              </>
            )}
            {result?.error && (
              <div className="alert alert-critical">
                <div className="alert-title">⚠️ Backend Offline</div>
                <div className="alert-desc">{result.error}</div>
                <div className="code-block">cd backend && uvicorn main:app --reload</div>
              </div>
            )}
          </>
        )}

        {tab === "incidents" && (
          <div className="grid-2">
            <div className="card">
              <div className="section-title">📋 Incident History</div>
              <IncidentTimeline incidents={incidents} />
            </div>
            <div className="card">
              <div className="section-title">📊 Action Statistics</div>
              {stats?.action_stats?.length ? (
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <thead>
                    <tr style={{ color: "var(--muted)", textAlign: "left" }}>
                      <th style={{ padding: "8px 0", borderBottom: "1px solid var(--border)" }}>Action</th>
                      <th style={{ padding: "8px 0", borderBottom: "1px solid var(--border)" }}>Total</th>
                      <th style={{ padding: "8px 0", borderBottom: "1px solid var(--border)" }}>Success Rate</th>
                    </tr>
                  </thead>
                  <tbody>
                    {stats.action_stats.map((s, i) => (
                      <tr key={i}>
                        <td style={{ padding: "10px 0", borderBottom: "1px solid var(--border)" }}>{s.action}</td>
                        <td style={{ padding: "10px 0", borderBottom: "1px solid var(--border)" }}>{s.total}</td>
                        <td style={{ padding: "10px 0", borderBottom: "1px solid var(--border)" }}>
                          <div className="gauge-bar" style={{ width: 100 }}>
                            <div className="gauge-fill" style={{ width: `${s.success_rate * 100}%`, background: s.success_rate > .7 ? "#3fb950" : "#d29922" }} />
                          </div>
                          <span style={{ fontSize: 11, color: "var(--muted)" }}>{(s.success_rate * 100).toFixed(0)}%</span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              ) : <div className="text-muted text-sm">No statistics yet. Run some demo scenarios first.</div>}
            </div>
          </div>
        )}

        {tab === "chat" && (
          <div style={{ maxWidth: 700, margin: "0 auto" }}>
            <ChatInterface />
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
