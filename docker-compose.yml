version: "3.9"

services:

  # ── AI Engine + Backend API ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: xdevops-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data        # persist learning DB
    environment:
      - DRY_RUN=true
    networks:
      - xdevops-net
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: xdevops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - xdevops-net
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    container_name: xdevops-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - xdevops-net
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Elasticsearch ────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: xdevops-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - xdevops-net
    restart: unless-stopped

  # ── Kibana ───────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: xdevops-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - xdevops-net
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # ── Sample App to Monitor ────────────────────────────────────────────────────
  sample-app:
    build:
      context: .
      dockerfile: Dockerfile.sampleapp
    container_name: xdevops-sample-app
    ports:
      - "8080:8080"
    networks:
      - xdevops-net
    restart: unless-stopped

volumes:
  grafana_data:
  es_data:

networks:
  xdevops-net:
    driver: bridge
